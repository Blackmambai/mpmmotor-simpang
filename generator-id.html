    // Fungsi untuk membuat ID Unik standar
    function generateUUID() {
        if (typeof crypto !== 'undefined' && crypto.randomUUID) {
            return crypto.randomUUID();
        } else {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
    }

    // Fungsi hanya untuk menghasilkan ID dan menampilkan di Textarea
    function generateIds() {
        const count = parseInt(document.getElementById('countInput').value) || 1;
        const outputEl = document.getElementById('idOutput');
        
        let generatedIds = [];
        for(let i = 0; i < count; i++) {
            generatedIds.push(generateUUID());
        }
        
        outputEl.value = generatedIds.join('\n');
    }

    // Fungsi khusus untuk menyalin teks yang ada di Textarea
    function copyIds() {
        const outputEl = document.getElementById('idOutput');
        const textToCopy = outputEl.value;

        // Validasi jika belum ada ID yang dibuat
        if(!textToCopy || textToCopy.includes("Klik tombol")) {
            alert("Silakan klik 'Buat ID' terlebih dahulu sebelum menyalin!");
            return;
        }

        // Salin ke Clipboard
        navigator.clipboard.writeText(textToCopy).then(() => {
            // Hitung baris untuk notifikasi
            const count = textToCopy.split('\n').filter(id => id.trim() !== '').length;
            document.getElementById('toastCount').innerText = count;
            
            const toastEl = document.getElementById('copyToast');
            const toast = new bootstrap.Toast(toastEl, { delay: 2000 });
            toast.show();
            
            // Animasi visual
            outputEl.style.transform = "scale(1.02)";
            outputEl.style.transition = "transform 0.2s";
            setTimeout(() => outputEl.style.transform = "scale(1)", 200);
        }).catch(err => {
            alert('Gagal menyalin otomatis. Silakan blok teks manual dan salin.');
        });
    }
</script><script src="assets/bootstrap/js/bootstrap.min.js"></script><script src="assets/js/script.min.js"></script></body></html>
