    // --- KONFIGURASI KEAMANAN & API ---
    const PIN_RAHASIA = "112233"; 
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyU5O8DhoHqWzsVRNvl_uiFCsnGW4mPJRjytsEgsOq8RlhM1kFgoFZk2nLWkLtFXiCd/exec'; 
    
    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    
    let globalData = [];
    let formModalInstance;
    let variasiModalInstance;
    let currentTipeMotor = "";

    window.onload = () => {
        formModalInstance = new bootstrap.Modal(document.getElementById('formModal'));
        variasiModalInstance = new bootstrap.Modal(document.getElementById('variasiModal'));
        
        if(sessionStorage.getItem('adminLoggedIn') === 'true') {
            tampilkanMainContent();
        }
        
        document.getElementById('pinInput').addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                loginAdmin();
            }
        });
    };

    function loginAdmin() {
        const inputPIN = document.getElementById('pinInput').value;
        if(inputPIN === PIN_RAHASIA) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            tampilkanMainContent();
        } else {
            document.getElementById('pinError').style.display = 'block';
            document.getElementById('pinInput').value = '';
            document.getElementById('pinInput').focus();
        }
    }

    function tampilkanMainContent() {
        const loginScreen = document.getElementById('loginScreen');
        loginScreen.classList.remove('d-flex'); 
        loginScreen.style.display = 'none';

        document.getElementById('mainContent').style.display = 'block';
        document.body.style.backgroundColor = '#f0f2f5'; 
        loadData(); 
    }

    function logoutAdmin() {
        sessionStorage.removeItem('adminLoggedIn');
        location.reload(); 
    }

    // --- FUNGSI PENGELOLAAN DATA ---
    async function loadData() {
        const listContainer = document.getElementById('dataList');
        const loading = document.getElementById('loadingIndicator');
        
        loading.style.display = 'block';
        listContainer.innerHTML = '';

        try {
            const res = await fetch(APPS_SCRIPT_URL, { redirect: "follow" });
            globalData = await res.json();
            
            loading.style.display = 'none';

            if(globalData.length === 0) {
                listContainer.innerHTML = '<div class="col-12 text-center mt-4 text-muted"><i class="bi bi-inbox fs-1"></i><p>Database Kosong.</p></div>';
                return;
            }

            renderList(globalData);
        } catch(e) {
            loading.style.display = 'none';
            listContainer.innerHTML = '<div class="col-12 text-center text-danger"><p>Gagal memuat data!</p></div>';
        }
    }

    // --- MENAMPILKAN CARD BERDASARKAN TIPE MOTOR (GROUPING) ---
    function renderList(data) {
        const listContainer = document.getElementById('dataList');
        listContainer.innerHTML = '';
        
        if(data.length === 0) {
            listContainer.innerHTML = '<div class="col-12 text-center mt-4 text-muted">Data tidak ditemukan.</div>';
            return;
        }

        // Mengelompokkan data berdasarkan 'Tipe Motor'
        const groupedData = {};
        data.forEach(item => {
            const tipe = (item['Tipe Motor'] || '').trim();
            if(!groupedData[tipe]) {
                groupedData[tipe] = [];
            }
            groupedData[tipe].push(item);
        });

        // Merender setiap grup tipe motor ke dalam 1 card
        for (const tipe in groupedData) {
            const variations = groupedData[tipe];
            const rep = variations[0]; // Mengambil baris pertama sebagai perwakilan data motor
            
            const imgTag = rep['URL Gambar'] ? rep['URL Gambar'] : 'https://via.placeholder.com/100?text=No+Img';
            
            listContainer.innerHTML += `
                <div class="col-12 col-md-6 col-xl-4">
                    <div class="item-card">
                        <div class="d-flex align-items-center mb-3">
                            <img src="${imgTag}" class="item-img shadow-sm" alt="img">
                            <div class="ms-3 flex-grow-1">
                                <h6 class="fw-bold mb-1 text-dark lh-sm">${rep['Tipe Motor']}</h6>
                                <span class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25">${rep['Jenis Motor']}</span>
                            </div>
                        </div>
                        
                        <div class="bg-light rounded p-2 mb-3 text-center d-flex justify-content-between">
                            <div class="text-start">
                                <div class="text-muted small">Harga OTR</div>
                                <div class="fw-bold text-dark">${formatRp(rep['Harga OTR'])}</div>
                            </div>
                            <div class="text-end border-start ps-3">
                                <div class="text-muted small">Jumlah DP</div>
                                <div class="fw-bold text-danger">${variations.length} Varian</div>
                            </div>
                        </div>
                        
                        <button class="btn btn-outline-danger w-100 fw-bold shadow-sm justify-content-center align-items-center d-dlex" style="border-radius: 10px;" onclick="bukaVarian('${tipe.replace(/'/g, "\\'")}')">

    // --- FUNGSI MENGELOLA MODAL VARIAN DP ---
    function bukaVarian(tipe) {
        currentTipeMotor = tipe;
        const variations = globalData.filter(item => (item['Tipe Motor'] || '').trim() === tipe);
        
        // Urutkan Varian DP dari terkecil
        variations.sort((a, b) => Number(a['Uang Muka']) - Number(b['Uang Muka']));
        
        document.getElementById('variasiTipeMotor').innerText = tipe;
        document.getElementById('variasiOtr').innerText = `OTR: ${formatRp(variations[0]['Harga OTR'])}`;
        
        const tbody = document.getElementById('variasiTableBody');
        tbody.innerHTML = '';
        
        variations.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold text-danger">${formatRp(item['Uang Muka'])}</td>
                    <td>${formatRp(item['11 Bulan'])}</td>
                    <td>${formatRp(item['17 Bulan'])}</td>
                    <td>${formatRp(item['23 Bulan'])}</td>
                    <td class="d-flex text-center">
                        <button class="btn edit btn-sm btn-outline-secondary py-0 px-2 me-1" onclick="editData('${item['ID']}')" title="Edit DP"><i class="fas fa-pen fs-5"></i></button>
                        <button class="btn hapus btn-sm btn-outline-danger py-0 px-2" onclick="deleteData('${item['ID']}')" title="Hapus DP"><i class="fas fa-trash-alt fs-5"></i></button>
                    </td>
                </tr>
            `;
        });
        
        variasiModalInstance.show();
    }

    function filterData() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filteredData = globalData.filter(item => {
            const jenis = (item['Jenis Motor'] || '').toLowerCase();
            const tipe = (item['Tipe Motor'] || '').toLowerCase();
            return jenis.includes(keyword) || tipe.includes(keyword);
        });
        renderList(filteredData);
    }

    // --- FORM TAMBAH / EDIT ---
    function openAddForm() {
        document.getElementById('dataForm').reset();
        document.getElementById('formId').value = ""; 
        document.getElementById('formTitle').innerText = "Tambah Motor Baru";
        document.getElementById('btnSubmit').innerText = 'Simpan Data Baru';
        formModalInstance.show();
    }

    // Dipanggil saat klik "Tambah DP Baru" dari dalam Modal Varian DP
    function addVariationFromModal() {
        const item = globalData.find(d => (d['Tipe Motor'] || '').trim() === currentTipeMotor);
        if(!item) return;

        variasiModalInstance.hide(); 

        document.getElementById('dataForm').reset();
        document.getElementById('formId').value = ""; 
        
        document.getElementById('formJenis').value = item['Jenis Motor'];
        document.getElementById('formTipe').value = item['Tipe Motor'];
        document.getElementById('formOTR').value = item['Harga OTR'];
        document.getElementById('formURL').value = item['URL Gambar'];
        
        document.getElementById('formTitle').innerText = `Tambah DP Baru: ${item['Tipe Motor']}`;
        document.getElementById('btnSubmit').innerText = 'Simpan DP Baru';
        formModalInstance.show();
    }

    function editData(id) {
        variasiModalInstance.hide(); // Tutup modal varian sementara

        const item = globalData.find(d => d['ID'] === id);
        if(!item) return;

        document.getElementById('formId').value = item['ID'];
        document.getElementById('formJenis').value = item['Jenis Motor'];
        document.getElementById('formTipe').value = item['Tipe Motor'];
        document.getElementById('formOTR').value = item['Harga OTR'];
        document.getElementById('formURL').value = item['URL Gambar'];
        document.getElementById('formDP').value = item['Uang Muka'];
        document.getElementById('form12').value = item['11 Bulan'];
        document.getElementById('form18').value = item['17 Bulan'];
        document.getElementById('form24').value = item['23 Bulan'];
        document.getElementById('form30').value = item['29 Bulan'];
        document.getElementById('form36').value = item['35 Bulan'];

        document.getElementById('formTitle').innerText = `Edit DP: ${formatRp(item['Uang Muka'])}`;
        document.getElementById('btnSubmit').innerText = 'Perbarui Data (Update)';
        formModalInstance.show();
    }

    async function submitData(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const isEdit = document.getElementById('formId').value !== "";
        
        const originalText = btn.innerText;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menyimpan...'; 
        btn.disabled = true;

        const payload = {
            action: isEdit ? "edit" : "add",
            id: document.getElementById('formId').value,
            jenisMotor: document.getElementById('formJenis').value,
            tipeMotor: document.getElementById('formTipe').value,
            hargaOtr: document.getElementById('formOTR').value,
            uangMuka: document.getElementById('formDP').value,
            bln12: document.getElementById('form12').value,
            bln18: document.getElementById('form18').value,
            bln24: document.getElementById('form24').value,
            bln30: document.getElementById('form30').value,
            bln36: document.getElementById('form36').value,
            urlGambar: document.getElementById('formURL').value
        };

        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload),
                redirect: "follow"
            });
            formModalInstance.hide();
            
            await loadData(); // Sinkronisasi ulang data
            
            // Coba Buka kembali Modal Varian DP jika asalnya dari mengedit motor tertentu
            if(currentTipeMotor) {
                const cekMasihAda = globalData.some(d => (d['Tipe Motor'] || '').trim() === currentTipeMotor);
                if(cekMasihAda) bukaVarian(currentTipeMotor);
            }
        } catch(err) {
            alert('Terjadi kesalahan saat menyimpan data.');
        }

        btn.innerText = originalText; 
        btn.disabled = false;
    }

    async function deleteData(id) {
        if(!confirm('Yakin ingin menghapus varian DP dan Cicilan ini?')) return;
        
        variasiModalInstance.hide(); // Sembunyikan untuk menghindari duplikasi saat render

        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "delete", id: id }),
                redirect: "follow"
            });
            
            await loadData();
            
            // Buka kembali Modal Varian apabila motor masih memiliki sisa Varian DP
            if(currentTipeMotor) {
                const sisaData = globalData.some(d => (d['Tipe Motor'] || '').trim() === currentTipeMotor);
                if(sisaData) bukaVarian(currentTipeMotor);
            }
        } catch(err) {
            alert('Gagal menghapus data.');
        }
    }
