</head><body style="font-family: Poppins, sans-serif;"><nav class="navbar navbar-expand-lg sticky-top shadow-sm py-3 navbar-custom" style="background: var(--soft-gray);"><div class="container"><a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#"><img src="https://ik.imagekit.io/zlt25mb52fx/ahmcdn/assets/images/logo/honda.svg" alt="Honda" width="170" height="28" style="height: auto;"></a></div></nav><div class="container text-center d-flex flex-column justify-content-center align-items-center mb-5 profile-wrapper" style="padding-top: 28px;"><div class="container"><div class="row justify-content-center"><div class="col-md-8 col-lg-6" style="padding-right: 0px;padding-left: 0px;"><div class="card card-custom"><div class="card-header-honda" style="padding: 0px;"><img class="img-fluid" width="2433" height="1400" src="assets/img/galeri/3.webp"></div><div class="card-body p-4 p-md-5"><form id="hondaForm"><div class="input-group-custom"><i class="fas fa-user"></i><input class="form-control" type="text" id="userName" placeholder="Nama Lengkap" required=""></div><div class="input-group-custom"><i class="fab fa-whatsapp"></i><input class="form-control" type="tel" id="userPhone" placeholder="Nomor WhatsApp (Contoh: 0812...)" required=""></div><div class="mb-4"><div class="d-flex justify-content-between align-items-center mb-2" style="padding:0 5px;"><label class="form-label small fw-bold text-muted mb-0">Pilih Tanggal Bertemu</label><span class="small fw-bold text-danger" id="selectedDateText"></span></div><input type="hidden" id="selectedDateInput" required=""><div class="date-slider-container"><div id="dateSlider" class="date-slider"></div></div></div><div class="input-group-custom"><i class="fas fa-motorcycle"></i><select class="form-select" id="serviceType" required=""><option value="" selected="">Pilih Perihal</option><option value="Pembelian Motor Honda">Ingin Melakukan Pembelian Motor</option><option value="Konsultasi Service">Konsultasi Service</option><option value="Test Ride">Request Test Ride</option><option value="Klaim Asuransi/Garansi">Klaim Asuransi / Garansi</option></select></div><div class="mb-4"><textarea class="form-control" id="userMessage" placeholder="Pesan atau Tipe Motor yang Diminati..." rows="3" style="padding-left:1rem;"></textarea></div><div class="form-check mb-4 custom-checkbox"><input class="form-check-input" type="checkbox" id="dataCheck" required="" value=""><label class="form-check-label small text-start text-muted" for="dataCheck">                                    Saya menyetujui bahwa data saya akan disimpan dengan aman untuk keperluan koordinasi janji temu.                                </label></div><button class="btn btn-primary w-100 btn-honda text-white" type="submit"><i class="fas fa-paper-plane"></i> KIRIM JANJI TEMU                            </button></form><div class="bg-light shadow-sm mt-4 message-box" id="statusMessage"><i class="fas fa-check-circle text-success mb-3 fa-4x"></i><h4 class="fw-bold text-dark">Permintaan Terkirim!</h4><p class="small text-muted mb-4">Mengarahkan Anda ke WhatsApp untuk konfirmasi langsung...</p><button class="btn btn-outline-secondary btn-reload"><i class="fas fa-redo-alt me-2"></i>Buat Janji Lagi                            </button></div></div></div></div></div></div><script>
        // Configuration
        const WHATSAPP_NUMBER = "6281359852804";
        
        // Date Slider Logic
        const dateSlider = document.getElementById('dateSlider');
        const selectedDateInput = document.getElementById('selectedDateInput');
        const selectedDateText = document.getElementById('selectedDateText');
        
        const daysToGenerate = 30; // Buat slider untuk 30 hari ke depan
        const monthsShort = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
        const monthsFull = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const daysShort = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

        function renderDateSlider() {
            const today = new Date();
            today.setHours(0,0,0,0);
            
            dateSlider.innerHTML = ''; // Clear container

            for(let i = 0; i < daysToGenerate; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);

                const card = document.createElement('div');
                card.className = 'date-card';
                if (d.getDay() === 0) card.classList.add('sunday');

                const dayName = document.createElement('div');
                dayName.className = 'day';
                dayName.innerText = daysShort[d.getDay()];

                const dateNum = document.createElement('div');
                dateNum.className = 'date';
                dateNum.innerText = d.getDate();

                const monthName = document.createElement('div');
                monthName.className = 'month';
                monthName.innerText = monthsShort[d.getMonth()];

                card.appendChild(dayName);
                card.appendChild(dateNum);
                card.appendChild(monthName);

                // Set hari ini sebagai default yang terpilih
                if(i === 0) {
                    card.classList.add('active');
                    setSelectedDate(d);
                }

                card.onclick = () => {
                    document.querySelectorAll('.date-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    setSelectedDate(d);
                    
                    // Scroll otomatis agar card yang di-klik ke tengah
                    card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                };

                dateSlider.appendChild(card);
            }
        }

        function setSelectedDate(d) {
            const formattedDate = `${d.getDate()} ${monthsFull[d.getMonth()]} ${d.getFullYear()}`;
            selectedDateInput.value = formattedDate;
            selectedDateText.innerText = formattedDate;
        }

        renderDateSlider();

        // Form Submission
        document.getElementById('hondaForm').onsubmit = function(e) {
            e.preventDefault();
            
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const date = document.getElementById('selectedDateInput').value;
            const type = document.getElementById('serviceType').value;
            const msg = document.getElementById('userMessage').value || "-";

            // Format WhatsApp Message
            const text = `Halo kak,\n\nSaya ingin membuat Janji Temu:\n\n*Nama:* ${name}\n*No WhatsApp:* ${phone}\n*Tanggal:* ${date}\n*Perihal:* ${type}\n*Pesan:* ${msg}\n\nMohon segera dikonfirmasi. Terima kasih.`;
            const encodedText = encodeURIComponent(text);
            const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedText}`;

            // Show Success & Redirect
            document.getElementById('hondaForm').style.display = 'none';
            document.getElementById('statusMessage').style.display = 'block';

            setTimeout(() => {
                window.open(waUrl, '_blank');
            }, 1500);
        };
    </script></div><footer class="text-center text-white bg-dark py-4" style="margin-top: 0px;"><p class="text-white-50 mb-0" style="font-size: 15px;">© 2026 Ella MPM Motor Simpang - Surabaya</p></footer><script src="assets/bootstrap/js/bootstrap.min.js"></script><script src="assets/js/script.min.js"></script></body></html>
